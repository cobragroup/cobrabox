name: CI

on:
  push:
    branches: ["**"]

jobs:
  tests:
    uses: ./.github/workflows/tests.yml
    with:
      python-version: "3.14"
      os: "ubuntu-latest"

  publish-results:
    name: Publish test results
    needs: tests
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: test-results-ubuntu-latest-py3.14

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: junit.xml
          comment_mode: always
