name: CI

on:
  push:
    branches: ["**"]

jobs:
  tests:
    uses: ./.github/workflows/tests.yml
    with:
      python-version: "3.14"
      os: "ubuntu-latest"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"

      - name: Ty check
        run: uv run ty check src

      - name: Ruff check
        run: uvx ruff check --output-format=github

      - name: Ruff format
        run: uvx ruff format --check

  publish-results:
    name: Publish test results
    needs: tests
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: test-results-ubuntu-latest-py3.14

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: junit.xml
          comment_mode: always
